<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #faf8ef 0%, #f0e6d3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #776e65;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label {
            color: #eee4da;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .score-box .value {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .new-game-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .grid-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            width: 440px;
            height: 440px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }
        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 420px;
            height: 420px;
            pointer-events: none;
        }
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            transition: transform 0.15s ease-in-out;
            z-index: 10;
        }
        .tile.new {
            animation: fade-in-scale 0.2s ease-in-out;
        }
        .tile.merged {
            z-index: 20;
        }
        .tile.removing {
            opacity: 0;
            transition: opacity 0.15s ease-in-out;
        }
        @keyframes fade-in-scale {
            0% { opacity: 0; }
            50% { opacity: 1; }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 15px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 20px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 25px rgba(243, 215, 116, 0.6); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 30px rgba(243, 215, 116, 0.7); }
        .tile-2048.pulse { animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .overlay.win h2 { color: #edc22e; }
        .overlay.lose h2 { color: #776e65; }
        .instructions {
            color: #8f7a66;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        .instructions strong { color: #776e65; }
        .leaderboard-section {
            background: #bbada0;
            border-radius: 10px;
            padding: 20px;
            min-width: 250px;
            max-width: 300px;
        }
        .leaderboard-section h2 {
            color: #f9f6f2;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }
        .leaderboard-list {
            list-style: none;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            color: #f9f6f2;
        }
        .leaderboard-item.top-3 { background: rgba(237, 194, 46, 0.3); }
        .leaderboard-rank {
            font-weight: bold;
            font-size: 18px;
            min-width: 30px;
        }
        .leaderboard-name {
            flex: 1;
            text-align: left;
            padding: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .leaderboard-score {
            font-weight: bold;
            font-size: 18px;
        }
        .leaderboard-loading, .leaderboard-empty {
            text-align: center;
            color: #eee4da;
            padding: 20px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 200;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #faf8ef;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h3 {
            color: #776e65;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .modal-content p {
            color: #8f7a66;
            margin-bottom: 20px;
        }
        .final-score {
            font-size: 48px;
            color: #edc22e;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #bbada0;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: #8f7a66;
            color: #f9f6f2;
        }
        .modal-btn.primary:hover { background: #9f8a76; }
        .modal-btn.secondary {
            background: #bbada0;
            color: #f9f6f2;
        }
        .modal-btn.secondary:hover { background: #c5b5a8; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="score-container">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div class="value" id="best-score">0</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
            <div class="grid-container">
                <div class="grid" id="grid">
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                </div>
                <div class="tile-container" id="tile-container"></div>
                <div class="overlay" id="overlay">
                    <h2 id="overlay-message"></h2>
                    <button class="new-game-btn" onclick="newGame()">Try Again</button>
                </div>
            </div>
            <div class="instructions">
                <strong>HOW TO PLAY:</strong> Use arrow keys to move tiles. When two tiles with the same number touch, they merge into one!<br>
                Join the numbers to get to the <strong>2048 tile!</strong>
            </div>
        </div>
        <div class="leaderboard-section">
            <h2>🏆 Leaderboard</h2>
            <ul class="leaderboard-list" id="leaderboard-list">
                <li class="leaderboard-loading">Loading...</li>
            </ul>
        </div>
    </div>
    <div class="modal" id="name-modal">
        <div class="modal-content">
            <h3>New High Score!</h3>
            <p>Congratulations! You made it to the leaderboard!</p>
            <div class="final-score" id="final-score">0</div>
            <input type="text" class="name-input" id="name-input" placeholder="Enter your name" maxlength="20">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="submitScore()">Submit</button>
                <button class="modal-btn secondary" onclick="skipSubmit()">Skip</button>
            </div>
        </div>
    </div>
    <script>
        // Game state - board is source of truth
        let board = []; // 4x4 array of {value, tileId} or null
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let hasWon = false;
        let nextTileId = 0;
        
        // Tile elements in DOM - keyed by tileId
        let tileElements = {};
        
        // Animation lock
        let isAnimating = false;

        document.getElementById('best-score').textContent = bestScore;
        loadLeaderboard();

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(null));
            score = 0;
            hasWon = false;
            nextTileId = 0;
            updateScore();
            hideOverlay();
            clearTiles();
        }

        function clearTiles() {
            document.getElementById('tile-container').innerHTML = '';
            tileElements = {};
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function getTilePosition(row, col) {
            return { x: col * 110, y: row * 110 };
        }

        function createTileElement(tileId, value, row, col, isNew) {
            const el = document.createElement('div');
            el.className = `tile tile-${value}`;
            if (isNew) el.classList.add('new');
            el.textContent = value;
            el.id = `tile-${tileId}`;
            const pos = getTilePosition(row, col);
            el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
            document.getElementById('tile-container').appendChild(el);
            if (isNew) {
                setTimeout(() => el.classList.remove('new'), 200);
            }
            return el;
        }

        function updateTilePosition(el, row, col) {
            const pos = getTilePosition(row, col);
            el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
        }

        function spawnTile(row, col, value) {
            const tileId = nextTileId++;
            board[row][col] = { value, tileId };
            tileElements[tileId] = createTileElement(tileId, value, row, col, true);
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (!board[row][col]) emptyCells.push({row, col});
                }
            }
            if (emptyCells.length > 0) {
                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                spawnTile(cell.row, cell.col, value);
            }
        }

        // Move a line and return move info for animation
        function processLine(cells) {
            // cells is array of {row, col, value, tileId}
            const nonEmpty = cells.filter(c => c.value !== 0);
            const result = [];
            const merges = []; // {targetId, sourceId, newValue}
            let scoreAdd = 0;
            
            for (let i = 0; i < nonEmpty.length; i++) {
                if (i < nonEmpty.length - 1 && nonEmpty[i].value === nonEmpty[i+1].value) {
                    // Merge
                    const newValue = nonEmpty[i].value * 2;
                    result.push({
                        row: nonEmpty[i].row,
                        col: nonEmpty[i].col,
                        value: newValue,
                        tileId: nonEmpty[i].tileId,
                        merged: true
                    });
                    merges.push({
                        targetId: nonEmpty[i].tileId,
                        sourceId: nonEmpty[i+1].tileId,
                        newValue: newValue,
                        toRow: nonEmpty[i].row,
                        toCol: nonEmpty[i].col
                    });
                    scoreAdd += newValue;
                    i++;
                } else {
                    result.push(nonEmpty[i]);
                }
            }
            
            return { result, merges, scoreAdd };
        }

        function move(direction) {
            if (isAnimating) return false;
            isAnimating = true;
            
            // Always reset the lock after animation time, even if something breaks
            const animationTimeout = setTimeout(() => {
                isAnimating = false;
            }, 200);
            
            const newBoard = Array(4).fill(null).map(() => Array(4).fill(null));
            const allMerges = [];
            let moved = false;
            let scoreAdd = 0;

            for (let i = 0; i < 4; i++) {
                // Build line based on direction
                const line = [];
                for (let j = 0; j < 4; j++) {
                    let row, col;
                    if (direction === 'left') { row = i; col = j; }
                    else if (direction === 'right') { row = i; col = 3-j; }
                    else if (direction === 'up') { row = j; col = i; }
                    else { row = 3-j; col = i; }
                    
                    const cell = board[row][col];
                    line.push({
                        row, col,
                        value: cell ? cell.value : 0,
                        tileId: cell ? cell.tileId : null
                    });
                }

                const { result, merges, scoreAdd: add } = processLine(line);
                scoreAdd += add;
                allMerges.push(...merges);

                // Place results in new board
                for (let j = 0; j < result.length; j++) {
                    let row, col;
                    if (direction === 'left') { row = i; col = j; }
                    else if (direction === 'right') { row = i; col = 3-j; }
                    else if (direction === 'up') { row = j; col = i; }
                    else { row = 3-j; col = i; }
                    
                    const r = result[j];
                    if (r) {
                        if (r.row !== row || r.col !== col) moved = true;
                        newBoard[row][col] = { value: r.value, tileId: r.tileId };
                    }
                }
            }

            // Check if anything moved
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    const old = board[row][col];
                    const newCell = newBoard[row][col];
                    if ((old && !newCell) || (!old && newCell) || 
                        (old && newCell && old.tileId !== newCell.tileId)) {
                        moved = true;
                    }
                }
            }

            if (!moved) return false;

            // Animate: move all tiles to new positions
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    const cell = newBoard[row][col];
                    if (cell) {
                        const el = tileElements[cell.tileId];
                        if (el) {
                            updateTilePosition(el, row, col);
                        }
                    }
                }
            }

            // Animate merged tiles to destination then remove them
            allMerges.forEach(merge => {
                const sourceEl = tileElements[merge.sourceId];
                if (sourceEl) {
                    updateTilePosition(sourceEl, merge.toRow, merge.toCol);
                }
            });

            // After animation, update DOM
            setTimeout(() => {
                // Remove merged source tiles immediately (no fade)
                allMerges.forEach(merge => {
                    const el = tileElements[merge.sourceId];
                    if (el) {
                        if (el.parentNode) el.parentNode.removeChild(el);
                        delete tileElements[merge.sourceId];
                    }
                    // Update target tile to merged value
                    const targetEl = tileElements[merge.targetId];
                    if (targetEl) {
                        targetEl.className = `tile tile-${merge.newValue} merged`;
                        targetEl.textContent = merge.newValue;
                        setTimeout(() => targetEl.classList.remove('merged'), 200);
                        if (merge.newValue === 2048 && !hasWon) {
                            targetEl.classList.add('pulse');
                        }
                    }
                });

                // Update board
                board = newBoard;
                score += scoreAdd;
                updateScore();

                if (scoreAdd > 0 && scoreAdd >= 2048 && !hasWon) {
                    hasWon = true;
                    showWin();
                }

                // Add new tile
                addRandomTile();

                // Check game over
                if (!canMove()) {
                    setTimeout(showGameOver, 300);
                }
                
                clearTimeout(animationTimeout);
                isAnimating = false;
            }, 160);

            return true;
        }

        function canMove() {
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (!board[row][col]) return true;
                    if (col < 3 && board[row][col] && board[row][col+1] && 
                        board[row][col].value === board[row][col+1].value) return true;
                    if (row < 3 && board[row][col] && board[row+1][col] && 
                        board[row][col].value === board[row+1][col].value) return true;
                }
            }
            return false;
        }

        function showWin() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active win';
            message.textContent = 'You Win!';
        }

        function showGameOver() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active lose';
            message.textContent = 'Game Over!';
            checkHighScore();
        }

        function hideOverlay() {
            document.getElementById('overlay').className = 'overlay';
        }

        function makeMove(direction) {
            move(direction);
        }

        function newGame() {
            initBoard();
            addRandomTile();
            addRandomTile();
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': e.preventDefault(); makeMove('left'); break;
                case 'ArrowRight': e.preventDefault(); makeMove('right'); break;
                case 'ArrowUp': e.preventDefault(); makeMove('up'); break;
                case 'ArrowDown': e.preventDefault(); makeMove('down'); break;
            }
        });

        // Leaderboard functions
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const scores = await response.json();
                displayLeaderboard(scores);
            } catch (err) {
                document.getElementById('leaderboard-list').innerHTML = '<li class="leaderboard-empty">Could not load leaderboard</li>';
            }
        }

        function displayLeaderboard(scores) {
            const list = document.getElementById('leaderboard-list');
            if (scores.length === 0) {
                list.innerHTML = '<li class="leaderboard-empty">No scores yet!</li>';
                return;
            }
            list.innerHTML = scores.map((entry, index) => `
                <li class="leaderboard-item ${index < 3 ? 'top-3' : ''}">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
                    <span class="leaderboard-score">${entry.score}</span>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkHighScore() {
            try {
                const response = await fetch(`/api/leaderboard/is-highscore/${score}`);
                const { isHighScore } = await response.json();
                if (isHighScore) {
                    pendingScore = score;
                    document.getElementById('final-score').textContent = score;
                    document.getElementById('name-modal').classList.add('active');
                    document.getElementById('name-input').focus();
                }
            } catch (err) {
                console.error('Error checking high score:', err);
            }
        }

        async function submitScore() {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return;
            try {
                await fetch('/api/score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score: pendingScore })
                });
                document.getElementById('name-modal').classList.remove('active');
                document.getElementById('name-input').value = '';
                loadLeaderboard();
            } catch (err) {
                console.error('Error submitting score:', err);
            }
        }

        function skipSubmit() {
            document.getElementById('name-modal').classList.remove('active');
            document.getElementById('name-input').value = '';
        }

        document.getElementById('name-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitScore();
        });

        // Start game
        newGame();
    </script>
</body>
</html>
