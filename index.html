<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #faf8ef 0%, #f0e6d3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #776e65;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }

        .score-box .label {
            color: #eee4da;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .score-box .value {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .new-game-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .grid-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            width: 440px;
            height: 440px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 420px;
            height: 420px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            transition: transform 0.15s ease-in-out;
            z-index: 10;
        }

        .tile.new {
            animation: appear 0.2s ease-in-out;
        }

        .tile.merged {
            animation: pop 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 15px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 20px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 25px rgba(243, 215, 116, 0.6); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 30px rgba(243, 215, 116, 0.7); animation: pulse 1s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .overlay.win h2 {
            color: #edc22e;
        }

        .overlay.lose h2 {
            color: #776e65;
        }

        .instructions {
            color: #8f7a66;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .instructions strong {
            color: #776e65;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    
    <div class="game-container">
        <div class="score-container">
            <div class="score-box">
                <div class="label">Score</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">Best</div>
                <div class="value" id="best-score">0</div>
            </div>
        </div>
        
        <button class="new-game-btn" onclick="newGame()">New Game</button>
        
        <div class="grid-container">
            <div class="grid" id="grid">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="overlay" id="overlay">
                <h2 id="overlay-message"></h2>
                <button class="new-game-btn" onclick="newGame()">Try Again</button>
            </div>
        </div>
        
        <div class="instructions">
            <strong>HOW TO PLAY:</strong> Use arrow keys to move tiles. When two tiles with the same number touch, they merge into one!<br>
            Join the numbers to get to the <strong>2048 tile!</strong>
        </div>
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let hasWon = false;
        let tileIdCounter = 0;
        let tiles = [];

        document.getElementById('best-score').textContent = bestScore;

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            tileIdCounter = 0;
            tiles = [];
            updateScore();
            hideOverlay();
            renderTiles();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function getTilePosition(row, col) {
            return {
                x: col * 110,
                y: row * 110
            };
        }

        function createTileElement(tile) {
            const el = document.createElement('div');
            el.className = `tile tile-${tile.value} ${tile.isNew ? 'new' : ''} ${tile.merged ? 'merged' : ''}`;
            el.textContent = tile.value;
            const pos = getTilePosition(tile.row, tile.col);
            el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
            return el;
        }

        function renderTiles() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            tiles.forEach(tile => {
                container.appendChild(createTileElement(tile));
            });
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (board[row][col] === 0) {
                        emptyCells.push({row, col});
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                board[randomCell.row][randomCell.col] = value;
                tiles.push({
                    id: tileIdCounter++,
                    value: value,
                    row: randomCell.row,
                    col: randomCell.col,
                    isNew: true,
                    merged: false
                });
            }
        }

        function slideRowLeft(row) {
            let newRow = row.filter(val => val !== 0);
            let merged = Array(newRow.length).fill(false);
            
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1] && !merged[i]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow[i + 1] = 0;
                    merged[i] = true;
                    
                    if (newRow[i] === 2048 && !hasWon) {
                        hasWon = true;
                        setTimeout(showWin, 300);
                    }
                }
            }
            
            newRow = newRow.filter(val => val !== 0);
            while (newRow.length < 4) {
                newRow.push(0);
            }
            
            return newRow;
        }

        function moveLeft() {
            let moved = false;
            for (let row = 0; row < 4; row++) {
                const newRow = slideRowLeft(board[row]);
                if (JSON.stringify(newRow) !== JSON.stringify(board[row])) {
                    moved = true;
                }
                board[row] = newRow;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let row = 0; row < 4; row++) {
                const reversed = [...board[row]].reverse();
                const newRow = slideRowLeft(reversed).reverse();
                if (JSON.stringify(newRow) !== JSON.stringify(board[row])) {
                    moved = true;
                }
                board[row] = newRow;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let col = 0; col < 4; col++) {
                const column = [board[0][col], board[1][col], board[2][col], board[3][col]];
                const newColumn = slideRowLeft(column);
                for (let row = 0; row < 4; row++) {
                    if (board[row][col] !== newColumn[row]) {
                        moved = true;
                    }
                    board[row][col] = newColumn[row];
                }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let col = 0; col < 4; col++) {
                const column = [board[0][col], board[1][col], board[2][col], board[3][col]];
                const newColumn = slideRowLeft(column.reverse()).reverse();
                for (let row = 0; row < 4; row++) {
                    if (board[row][col] !== newColumn[row]) {
                        moved = true;
                    }
                    board[row][col] = newColumn[row];
                }
            }
            return moved;
        }

        function updateTilesFromBoard() {
            const newTiles = [];
            const usedIds = new Set();
            
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (board[row][col] !== 0) {
                        const value = board[row][col];
                        let found = false;
                        
                        for (let tile of tiles) {
                            if (!usedIds.has(tile.id) && tile.value === value && 
                                (tile.row !== row || tile.col !== col)) {
                                newTiles.push({
                                    ...tile,
                                    row: row,
                                    col: col,
                                    isNew: false,
                                    merged: false
                                });
                                usedIds.add(tile.id);
                                found = true;
                                break;
                            }
                        }
                        
                        if (!found) {
                            for (let tile of tiles) {
                                if (!usedIds.has(tile.id) && tile.row === row && tile.col === col) {
                                    newTiles.push({
                                        ...tile,
                                        value: value,
                                        isNew: false,
                                        merged: false
                                    });
                                    usedIds.add(tile.id);
                                    found = true;
                                    break;
                                }
                            }
                        }
                        
                        if (!found) {
                            newTiles.push({
                                id: tileIdCounter++,
                                value: value,
                                row: row,
                                col: col,
                                isNew: true,
                                merged: false
                            });
                        }
                    }
                }
            }
            
            tiles = newTiles;
        }

        function canMove() {
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (board[row][col] === 0) return true;
                    if (col < 3 && board[row][col] === board[row][col + 1]) return true;
                    if (row < 3 && board[row][col] === board[row + 1][col]) return true;
                }
            }
            return false;
        }

        function showWin() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active win';
            message.textContent = 'You Win!';
        }

        function showGameOver() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active lose';
            message.textContent = 'Game Over!';
        }

        function hideOverlay() {
            const overlay = document.getElementById('overlay');
            overlay.className = 'overlay';
        }

        function makeMove(direction) {
            let moved = false;
            
            switch(direction) {
                case 'left':
                    moved = moveLeft();
                    break;
                case 'right':
                    moved = moveRight();
                    break;
                case 'up':
                    moved = moveUp();
                    break;
                case 'down':
                    moved = moveDown();
                    break;
            }
            
            if (moved) {
                updateTilesFromBoard();
                renderTiles();
                addRandomTile();
                updateScore();
                renderTiles();
                
                if (!canMove()) {
                    setTimeout(showGameOver, 300);
                }
            }
        }

        function newGame() {
            initBoard();
            addRandomTile();
            addRandomTile();
            renderTiles();
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    makeMove('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    makeMove('right');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    makeMove('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    makeMove('down');
                    break;
            }
        });

        newGame();
    </script>
</body>
</html>
