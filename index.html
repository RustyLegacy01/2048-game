<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #faf8ef 0%, #f0e6d3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #776e65;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label {
            color: #eee4da;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .score-box .value {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .new-game-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .grid-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            width: 440px;
            height: 440px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }
        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 420px;
            height: 420px;
            pointer-events: none;
        }
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            transition: transform 0.15s ease-in-out;
            z-index: 10;
        }
        .tile.new {
            animation: appear 0.2s ease-in-out;
        }
        .tile.merged {
            animation: pop 0.2s ease-in-out;
            z-index: 20;
        }
        .tile.removing {
            animation: fade-out 0.15s ease-in-out forwards;
        }
        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes fade-out {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 15px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; box-shadow: 0 0 20px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 25px rgba(243, 215, 116, 0.6); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; box-shadow: 0 0 30px rgba(243, 215, 116, 0.7); }
        .tile-2048.pulse { animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.8);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .overlay.win h2 { color: #edc22e; }
        .overlay.lose h2 { color: #776e65; }
        .instructions {
            color: #8f7a66;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        .instructions strong { color: #776e65; }
        .leaderboard-section {
            background: #bbada0;
            border-radius: 10px;
            padding: 20px;
            min-width: 250px;
            max-width: 300px;
        }
        .leaderboard-section h2 {
            color: #f9f6f2;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }
        .leaderboard-list {
            list-style: none;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            color: #f9f6f2;
        }
        .leaderboard-item.top-3 { background: rgba(237, 194, 46, 0.3); }
        .leaderboard-rank {
            font-weight: bold;
            font-size: 18px;
            min-width: 30px;
        }
        .leaderboard-name {
            flex: 1;
            text-align: left;
            padding: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .leaderboard-score {
            font-weight: bold;
            font-size: 18px;
        }
        .leaderboard-loading, .leaderboard-empty {
            text-align: center;
            color: #eee4da;
            padding: 20px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 200;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #faf8ef;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h3 {
            color: #776e65;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .modal-content p {
            color: #8f7a66;
            margin-bottom: 20px;
        }
        .final-score {
            font-size: 48px;
            color: #edc22e;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .name-input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #bbada0;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.primary {
            background: #8f7a66;
            color: #f9f6f2;
        }
        .modal-btn.primary:hover { background: #9f8a76; }
        .modal-btn.secondary {
            background: #bbada0;
            color: #f9f6f2;
        }
        .modal-btn.secondary:hover { background: #c5b5a8; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="score-container">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div class="value" id="best-score">0</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">New Game</button>
            <div class="grid-container">
                <div class="grid" id="grid">
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                </div>
                <div class="tile-container" id="tile-container"></div>
                <div class="overlay" id="overlay">
                    <h2 id="overlay-message"></h2>
                    <button class="new-game-btn" onclick="newGame()">Try Again</button>
                </div>
            </div>
            <div class="instructions">
                <strong>HOW TO PLAY:</strong> Use arrow keys to move tiles. When two tiles with the same number touch, they merge into one!<br>
                Join the numbers to get to the <strong>2048 tile!</strong>
            </div>
        </div>
        <div class="leaderboard-section">
            <h2>🏆 Leaderboard</h2>
            <ul class="leaderboard-list" id="leaderboard-list">
                <li class="leaderboard-loading">Loading...</li>
            </ul>
        </div>
    </div>
    <div class="modal" id="name-modal">
        <div class="modal-content">
            <h3>New High Score!</h3>
            <p>Congratulations! You made it to the leaderboard!</p>
            <div class="final-score" id="final-score">0</div>
            <input type="text" class="name-input" id="name-input" placeholder="Enter your name" maxlength="20">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="submitScore()">Submit</button>
                <button class="modal-btn secondary" onclick="skipSubmit()">Skip</button>
            </div>
        </div>
    </div>
    <script>
        // Game state
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let hasWon = false;
        let tileIdCounter = 0;
        let tiles = []; // Array of {id, value, row, col, merged, isNew}
        let tileElements = new Map(); // id -> DOM element
        let isAnimating = false;
        let pendingScore = null;

        document.getElementById('best-score').textContent = bestScore;
        loadLeaderboard();

        function initBoard() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            tileIdCounter = 0;
            tiles = [];
            updateScore();
            hideOverlay();
            clearTileContainer();
        }

        function clearTileContainer() {
            document.getElementById('tile-container').innerHTML = '';
            tileElements.clear();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function getTilePosition(row, col) {
            return { x: col * 110, y: row * 110 };
        }

        function createTileElement(tile) {
            const el = document.createElement('div');
            el.className = `tile tile-${tile.value} ${tile.isNew ? 'new' : ''}`;
            el.textContent = tile.value;
            el.id = `tile-${tile.id}`;
            const pos = getTilePosition(tile.row, tile.col);
            el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
            if (tile.isNew) {
                setTimeout(() => el.classList.remove('new'), 200);
            }
            return el;
        }

        function updateTileElement(tile, el) {
            const pos = getTilePosition(tile.row, tile.col);
            el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
            el.className = `tile tile-${tile.value}`;
            if (tile.value === 2048) el.classList.add('pulse');
            el.textContent = tile.value;
            if (tile.merged) {
                el.classList.add('merged');
                setTimeout(() => el.classList.remove('merged'), 200);
            }
        }

        function renderTiles(removedTileIds = []) {
            const container = document.getElementById('tile-container');
            const currentIds = new Set(tiles.map(t => t.id));
            
            // Update or create tiles
            tiles.forEach(tile => {
                let el = tileElements.get(tile.id);
                if (!el) {
                    el = createTileElement(tile);
                    container.appendChild(el);
                    tileElements.set(tile.id, el);
                } else {
                    updateTileElement(tile, el);
                }
            });
            
            // Remove tiles that are gone
            removedTileIds.forEach(id => {
                const el = tileElements.get(id);
                if (el) {
                    el.classList.add('removing');
                    setTimeout(() => {
                        if (el.parentNode) el.parentNode.removeChild(el);
                    }, 150);
                    tileElements.delete(id);
                }
            });
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (board[row][col] === 0) emptyCells.push({row, col});
                }
            }
            if (emptyCells.length > 0) {
                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                board[cell.row][cell.col] = value;
                const newTile = {
                    id: tileIdCounter++,
                    value: value,
                    row: cell.row,
                    col: cell.col,
                    isNew: true,
                    merged: false
                };
                tiles.push(newTile);
                renderTiles();
            }
        }

        // Move logic with proper tile tracking
        function move(direction) {
            if (isAnimating) return false;
            
            const oldBoard = board.map(row => [...row]);
            const removedTileIds = [];
            const newTiles = [];
            let moved = false;

            // Process each line based on direction
            for (let i = 0; i < 4; i++) {
                let line = [];
                let positions = []; // Track where each tile ends up
                
                // Extract line
                for (let j = 0; j < 4; j++) {
                    let row, col;
                    if (direction === 'left') { row = i; col = j; }
                    else if (direction === 'right') { row = i; col = 3 - j; }
                    else if (direction === 'up') { row = j; col = i; }
                    else { row = 3 - j; col = i; }
                    
                    if (board[row][col] !== 0) {
                        // Find the tile at this position
                        const tile = tiles.find(t => t.row === row && t.col === col && !removedTileIds.includes(t.id));
                        if (tile) {
                            line.push({ ...tile, originalRow: row, originalCol: col });
                        }
                    }
                }

                // Merge tiles
                let mergedLine = [];
                for (let k = 0; k < line.length; k++) {
                    if (k < line.length - 1 && line[k].value === line[k + 1].value) {
                        // Merge these two
                        const mergedValue = line[k].value * 2;
                        mergedLine.push({
                            ...line[k],
                            value: mergedValue,
                            merged: true,
                            mergedFrom: line[k + 1].id
                        });
                        removedTileIds.push(line[k + 1].id);
                        score += mergedValue;
                        if (mergedValue === 2048 && !hasWon) {
                            hasWon = true;
                            setTimeout(showWin, 300);
                        }
                        k++; // Skip next
                    } else {
                        mergedLine.push(line[k]);
                    }
                }

                // Pad with zeros
                while (mergedLine.length < 4) {
                    mergedLine.push(null);
                }

                // Place tiles in new positions
                for (let j = 0; j < 4; j++) {
                    let row, col;
                    if (direction === 'left') { row = i; col = j; }
                    else if (direction === 'right') { row = i; col = 3 - j; }
                    else if (direction === 'up') { row = j; col = i; }
                    else { row = 3 - j; col = i; }

                    const tile = mergedLine[j];
                    if (tile) {
                        if (tile.row !== row || tile.col !== col) moved = true;
                        tile.row = row;
                        tile.col = col;
                        tile.isNew = false;
                        newTiles.push(tile);
                    }
                }
            }

            if (!moved) return false;

            // Update board
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            newTiles.forEach(tile => {
                board[tile.row][tile.col] = tile.value;
            });

            tiles = newTiles;
            updateScore();
            renderTiles(removedTileIds);
            return true;
        }

        function canMove() {
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 4; col++) {
                    if (board[row][col] === 0) return true;
                    if (col < 3 && board[row][col] === board[row][col + 1]) return true;
                    if (row < 3 && board[row][col] === board[row + 1][col]) return true;
                }
            }
            return false;
        }

        function showWin() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active win';
            message.textContent = 'You Win!';
        }

        function showGameOver() {
            const overlay = document.getElementById('overlay');
            const message = document.getElementById('overlay-message');
            overlay.className = 'overlay active lose';
            message.textContent = 'Game Over!';
            checkHighScore();
        }

        function hideOverlay() {
            document.getElementById('overlay').className = 'overlay';
        }

        function makeMove(direction) {
            if (move(direction)) {
                addRandomTile();
                if (!canMove()) {
                    setTimeout(showGameOver, 300);
                }
            }
        }

        function newGame() {
            initBoard();
            addRandomTile();
            addRandomTile();
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': e.preventDefault(); makeMove('left'); break;
                case 'ArrowRight': e.preventDefault(); makeMove('right'); break;
                case 'ArrowUp': e.preventDefault(); makeMove('up'); break;
                case 'ArrowDown': e.preventDefault(); makeMove('down'); break;
            }
        });

        // Leaderboard functions
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const scores = await response.json();
                displayLeaderboard(scores);
            } catch (err) {
                document.getElementById('leaderboard-list').innerHTML = '<li class="leaderboard-empty">Could not load leaderboard</li>';
            }
        }

        function displayLeaderboard(scores) {
            const list = document.getElementById('leaderboard-list');
            if (scores.length === 0) {
                list.innerHTML = '<li class="leaderboard-empty">No scores yet!</li>';
                return;
            }
            list.innerHTML = scores.map((entry, index) => `
                <li class="leaderboard-item ${index < 3 ? 'top-3' : ''}">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
                    <span class="leaderboard-score">${entry.score}</span>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkHighScore() {
            try {
                const response = await fetch(`/api/leaderboard/is-highscore/${score}`);
                const { isHighScore } = await response.json();
                if (isHighScore) {
                    pendingScore = score;
                    document.getElementById('final-score').textContent = score;
                    document.getElementById('name-modal').classList.add('active');
                    document.getElementById('name-input').focus();
                }
            } catch (err) {
                console.error('Error checking high score:', err);
            }
        }

        async function submitScore() {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return;
            try {
                await fetch('/api/score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score: pendingScore })
                });
                document.getElementById('name-modal').classList.remove('active');
                document.getElementById('name-input').value = '';
                loadLeaderboard();
            } catch (err) {
                console.error('Error submitting score:', err);
            }
        }

        function skipSubmit() {
            document.getElementById('name-modal').classList.remove('active');
            document.getElementById('name-input').value = '';
        }

        document.getElementById('name-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitScore();
        });

        // Start game
        newGame();
    </script>
</body>
</html>
